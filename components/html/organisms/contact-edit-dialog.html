<section
  class="contacts-overlay"
  id="contactEditOverlay"
  role="dialog"
  aria-modal="true"
  aria-labelledby="contactEditTitle"
  hidden
>
  <article class="contacts-dialog">
    <button
      class="contacts-dialog-close"
      type="button"
      id="contactEditClose"
      aria-label="Close edit contact"
    >
      x
    </button>
    <div class="contacts-dialog-side">
      <img src="./components/assets/img/icons/Join logo vector.svg" alt="" />
      <h2 id="contactEditTitle">Edit contact</h2>
    </div>
    <div class="contacts-dialog-body">
      <span class="contacts-dialog-avatar" id="contactEditAvatar"></span>
      <form class="contacts-dialog-form" id="contactEditForm">
        <div class="contacts-dialog-field">
          <input id="contactEditName" type="text" placeholder="Name" />
          <img src="./components/assets/img/icons/person.svg" alt="" />
        </div>
        <div class="contacts-dialog-field">
          <input id="contactEditEmail" type="text" placeholder="Email" />
          <img src="./components/assets/img/icons/mail.svg" alt="" />
        </div>
        <div class="contacts-dialog-field">
          <input id="contactEditPhone" type="text" placeholder="Phone" />
          <img src="./components/assets/img/icons/call.svg" alt="" />
        </div>
        <p class="contacts-dialog-error" id="contactEditError"></p>
        <div class="contacts-dialog-actions">
          <button
            class="contacts-dialog-secondary"
            type="button"
            id="contactEditDelete"
          >
            Delete
          </button>
          <button class="contacts-dialog-primary" type="submit">
            Save
            <img src="./components/assets/img/icons/check_icon.svg" alt="" />
          </button>
        </div>
      </form>
    </div>
  </article>
</section>

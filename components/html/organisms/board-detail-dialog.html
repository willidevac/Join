<section
  class="board-detail-overlay"
  id="boardTaskDetail"
  aria-labelledby="boardTaskDetailTitle"
  aria-modal="true"
  role="dialog"
  hidden
>
  <article class="board-detail-card" id="boardTaskDetailCard">
    <button
      class="board-detail-close"
      type="button"
      id="boardTaskDetailClose"
      aria-label="Close task details"
    >
      x
    </button>

    <div class="board-detail-view" id="boardTaskDetailView">
      <span class="board-detail-category" id="boardTaskDetailCategory"
        >Task</span
      >
      <h2 id="boardTaskDetailTitle">Task title</h2>
      <p id="boardTaskDetailDescription">Task description</p>
      <dl class="board-detail-list">
        <div>
          <dt>Due date</dt>
          <dd id="boardTaskDetailDueDate">-</dd>
        </div>
        <div>
          <dt>Priority</dt>
          <dd class="board-detail-priority">
            <span id="boardTaskDetailPriority">-</span>
            <img id="boardTaskDetailPriorityIcon" alt="" aria-hidden="true" hidden />
          </dd>
        </div>
        <div>
          <dt>Assigned to</dt>
          <dd id="boardTaskDetailAssignee" class="board-detail-assignees">-</dd>
        </div>
        <div>
          <dt>Subtasks</dt>
          <dd id="boardTaskDetailSubtasks" class="board-detail-subtasks">-</dd>
        </div>
      </dl>
      <div class="board-detail-mobile-status">
        <span>Move task</span>
        <div class="contact-dropdown" data-board-edit-dropdown>
          <button
            class="contact-dropdown__button"
            id="boardMobileStatusButton"
            type="button"
            aria-expanded="false"
            aria-controls="boardMobileStatusPanel"
          >
            To do
          </button>
          <div
            class="contact-dropdown__panel"
            id="boardMobileStatusPanel"
            role="listbox"
            aria-label="Task statuses"
            hidden
          >
            <button
              class="contact-dropdown__option contact-dropdown__option--single"
              type="button"
              role="option"
              data-value="todo"
            >
              To do
            </button>
            <button
              class="contact-dropdown__option contact-dropdown__option--single"
              type="button"
              role="option"
              data-value="in-progress"
            >
              In progress
            </button>
            <button
              class="contact-dropdown__option contact-dropdown__option--single"
              type="button"
              role="option"
              data-value="feedback"
            >
              Await feedback
            </button>
            <button
              class="contact-dropdown__option contact-dropdown__option--single"
              type="button"
              role="option"
              data-value="done"
            >
              Done
            </button>
          </div>
          <input type="hidden" id="boardTaskMobileStatus" />
        </div>
      </div>
      <div class="board-detail-actions">
        <button
          class="board-detail-action"
          type="button"
          id="boardTaskDeleteButton"
        >
          <img
            src="./components/assets/img/icons/delete.svg"
            alt=""
            aria-hidden="true"
          />
          Delete
        </button>
        <span class="board-detail-actions__divider" aria-hidden="true"></span>
        <button
          class="board-detail-action"
          type="button"
          id="boardTaskEditButton"
        >
          <img
            src="./components/assets/img/icons/edit.svg"
            alt=""
            aria-hidden="true"
          />
          Edit
        </button>
      </div>
    </div>

    <form
      class="board-detail-edit-form"
      id="boardTaskEditForm"
      novalidate
      hidden
    >
      <label>
        <span>Title</span>
        <input
          id="boardTaskEditTitle"
          type="text"
          aria-describedby="boardTaskEditTitleError"
        />
        <span
          class="board-detail-field-error"
          id="boardTaskEditTitleError"
          aria-live="polite"
          hidden
        ></span>
      </label>
      <label>
        <span>Description</span>
        <textarea id="boardTaskEditDescription" rows="4"></textarea>
      </label>
      <label>
        <span>Due date</span>
        <input
          id="boardTaskEditDueDate"
          type="date"
          aria-describedby="boardTaskEditDueDateError"
        />
        <span
          class="board-detail-field-error"
          id="boardTaskEditDueDateError"
          aria-live="polite"
          hidden
        ></span>
      </label>
      <div class="board-detail-field">
        <span>Category</span>
        <div class="contact-dropdown" data-board-edit-dropdown>
          <button
            class="contact-dropdown__button"
            id="boardEditCategoryButton"
            type="button"
            aria-expanded="false"
            aria-controls="boardEditCategoryPanel"
          >
            Select task category
          </button>
          <div
            class="contact-dropdown__panel"
            id="boardEditCategoryPanel"
            role="listbox"
            aria-label="Task categories"
            hidden
          >
            <button
              class="contact-dropdown__option contact-dropdown__option--single"
              type="button"
              role="option"
              data-value="user-story"
            >
              User Story
            </button>
            <button
              class="contact-dropdown__option contact-dropdown__option--single"
              type="button"
              role="option"
              data-value="technical-task"
            >
              Technical Task
            </button>
          </div>
          <input type="hidden" id="boardTaskEditCategory" />
        </div>
      </div>
      <div class="board-detail-field">
        <span>Priority</span>
        <div class="contact-dropdown" data-board-edit-dropdown>
          <button
            class="contact-dropdown__button"
            id="boardEditPriorityButton"
            type="button"
            aria-expanded="false"
            aria-controls="boardEditPriorityPanel"
          >
            Select priority
          </button>
          <div
            class="contact-dropdown__panel"
            id="boardEditPriorityPanel"
            role="listbox"
            aria-label="Task priorities"
            hidden
          >
            <button
              class="contact-dropdown__option contact-dropdown__option--single"
              type="button"
              role="option"
              data-value="urgent"
            >
              Urgent
            </button>
            <button
              class="contact-dropdown__option contact-dropdown__option--single"
              type="button"
              role="option"
              data-value="medium"
            >
              Medium
            </button>
            <button
              class="contact-dropdown__option contact-dropdown__option--single"
              type="button"
              role="option"
              data-value="low"
            >
              Low
            </button>
          </div>
          <input type="hidden" id="boardTaskEditPriority" />
        </div>
      </div>
      <div class="board-detail-field">
        <span>Status</span>
        <div class="contact-dropdown" data-board-edit-dropdown>
          <button
            class="contact-dropdown__button"
            id="boardEditStatusButton"
            type="button"
            aria-expanded="false"
            aria-controls="boardEditStatusPanel"
          >
            Select status
          </button>
          <div
            class="contact-dropdown__panel"
            id="boardEditStatusPanel"
            role="listbox"
            aria-label="Task statuses"
            hidden
          >
            <button
              class="contact-dropdown__option contact-dropdown__option--single"
              type="button"
              role="option"
              data-value="todo"
            >
              To do
            </button>
            <button
              class="contact-dropdown__option contact-dropdown__option--single"
              type="button"
              role="option"
              data-value="in-progress"
            >
              In progress
            </button>
            <button
              class="contact-dropdown__option contact-dropdown__option--single"
              type="button"
              role="option"
              data-value="feedback"
            >
              Await feedback
            </button>
            <button
              class="contact-dropdown__option contact-dropdown__option--single"
              type="button"
              role="option"
              data-value="done"
            >
              Done
            </button>
          </div>
          <input type="hidden" id="boardTaskEditStatus" />
        </div>
      </div>
      <div class="board-detail-field">
        <span>Assigned to</span>
        <div class="contact-dropdown" id="boardEditAssigneesDropdown">
          <button
            class="contact-dropdown__button"
            id="boardEditAssigneesButton"
            type="button"
            aria-expanded="false"
            aria-controls="boardEditAssigneesPanel"
          >
            Select contacts to assign
          </button>
          <div
            class="contact-dropdown__panel"
            id="boardEditAssigneesPanel"
            role="listbox"
            aria-label="Assignable contacts"
            hidden
          ></div>
          <div
            class="contact-dropdown__selected"
            id="boardEditAssigneesSelected"
            aria-live="polite"
          ></div>
        </div>
      </div>

      <label>
        <span>Subtasks</span>
        <textarea
          id="boardTaskEditSubtasks"
          rows="3"
          placeholder="One subtask per line"
        ></textarea>
      </label>
      <div class="board-detail-actions">
        <button
          class="board-detail-secondary"
          type="button"
          id="boardTaskEditCancel"
        >
          Cancel
        </button>
        <button class="board-detail-primary" type="submit">Save</button>
      </div>
    </form>
  </article>
</section>

<section class="board-detail-overlay" id="boardTaskDetail" aria-labelledby="boardTaskDetailTitle"
  aria-modal="true" role="dialog" hidden>
  <article class="board-detail-card">
    <button class="board-detail-close" type="button" id="boardTaskDetailClose" aria-label="Close task details">
      x
    </button>

    <div class="board-detail-view" id="boardTaskDetailView">
      <span class="board-detail-category" id="boardTaskDetailCategory">Task</span>
      <h2 id="boardTaskDetailTitle">Task title</h2>
      <p id="boardTaskDetailDescription">Task description</p>
      <dl class="board-detail-list">
        <div>
          <dt>Due date</dt>
          <dd id="boardTaskDetailDueDate">-</dd>
        </div>
        <div>
          <dt>Priority</dt>
          <dd id="boardTaskDetailPriority">-</dd>
        </div>
        <div>
          <dt>Status</dt>
          <dd id="boardTaskDetailStatus">-</dd>
        </div>
        <div>
          <dt>Assigned to</dt>
          <dd id="boardTaskDetailAssignee">-</dd>
        </div>
        <div>
          <dt>Subtasks</dt>
          <dd id="boardTaskDetailSubtasks" class="board-detail-subtasks">-</dd>
        </div>
      </dl>
      <label class="board-detail-mobile-status" for="boardTaskMobileStatus">
        <span>Move task</span>
        <select id="boardTaskMobileStatus">
          <option value="todo">To do</option>
          <option value="in-progress">In progress</option>
          <option value="feedback">Await feedback</option>
          <option value="done">Done</option>
        </select>
      </label>
      <div class="board-detail-actions board-detail-actions--between">
        <button class="board-detail-danger" type="button" id="boardTaskDeleteButton">
          Delete
        </button>
        <button class="board-detail-primary" type="button" id="boardTaskEditButton">
          Edit
        </button>
      </div>
    </div>

    <form class="board-detail-edit-form" id="boardTaskEditForm" hidden>
      <label>
        <span>Title</span>
        <input id="boardTaskEditTitle" type="text" required />
      </label>
      <label>
        <span>Description</span>
        <textarea id="boardTaskEditDescription" rows="4"></textarea>
      </label>
      <label>
        <span>Due date</span>
        <input id="boardTaskEditDueDate" type="date" required />
      </label>
      <label>
        <span>Category</span>
        <select id="boardTaskEditCategory" required>
          <option value="user-story">User Story</option>
          <option value="technical-task">Technical Task</option>
        </select>
      </label>
      <label>
        <span>Priority</span>
        <select id="boardTaskEditPriority" required>
          <option value="urgent">Urgent</option>
          <option value="medium">Medium</option>
          <option value="low">Low</option>
        </select>
      </label>
      <label>
        <span>Status</span>
        <select id="boardTaskEditStatus" required>
          <option value="todo">To do</option>
          <option value="in-progress">In progress</option>
          <option value="feedback">Await feedback</option>
          <option value="done">Done</option>
        </select>
      </label>
      <label>
        <span>Assigned to</span>
        <div class="board-detail-assignees" id="boardTaskEditAssignees"></div>
      </label>
      <label>
        <span>Subtasks</span>
        <textarea id="boardTaskEditSubtasks" rows="3" placeholder="One subtask per line"></textarea>
      </label>
      <div class="board-detail-actions">
        <button class="board-detail-secondary" type="button" id="boardTaskEditCancel">
          Cancel
        </button>
        <button class="board-detail-primary" type="submit">Save</button>
      </div>
    </form>
  </article>
</section>

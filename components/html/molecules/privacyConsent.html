<div class="privacy-consent" data-component="privacy-consent">
  <div class="privacy-consent__control">
    <input
      class="privacy-consent__checkbox"
      id="privacyAccepted"
      name="privacyAccepted"
      type="checkbox"
      disabled
      aria-describedby="privacyConsentHint signupMessage"
    />
    <label class="privacy-consent__label" for="privacyAccepted">
      I accept the
      <a
        class="privacy-consent__link"
        id="privacyPolicyLink"
        href="./privacyPolicy.html"
        data-page="privacy-policy"
      >
        Privacy policy
      </a>
    </label>
  </div>
  <p class="privacy-consent__hint" id="privacyConsentHint" aria-live="polite">
    Open the Privacy Policy first to enable this checkbox.
  </p>
</div>

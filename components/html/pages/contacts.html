<main class="summary-shell contacts-shell">
  <aside class="summary-sidebar" aria-label="Main navigation">
    <a
      class="summary-sidebar__logo"
      href="?page=summary"
      data-page="summary"
      aria-label="Go to summary"
    >
      <img src="./components/assets/icons/Join logo vector.svg" alt="" />
    </a>

    <nav class="summary-nav">
      <a class="summary-nav__item" href="?page=summary" data-page="summary">
        <span class="summary-nav__icon" aria-hidden="true">
          <img src="./components/assets/icons/summary_icons.svg" alt="" />
        </span>
        <span>Summary</span>
      </a>
      <a class="summary-nav__item" href="?page=add-task" data-page="add-task">
        <span class="summary-nav__icon" aria-hidden="true">
          <img src="./components/assets/icons/add_task_icons.svg" alt="" />
        </span>
        <span>Add Task</span>
      </a>
      <a class="summary-nav__item" href="?page=board" data-page="board">
        <span class="summary-nav__icon" aria-hidden="true">
          <img src="./components/assets/icons/board_icons.svg" alt="" />
        </span>
        <span>Board</span>
      </a>
      <a
        class="summary-nav__item summary-nav__item--active"
        href="?page=contacts"
        data-page="contacts"
      >
        <span class="summary-nav__icon" aria-hidden="true">
          <img src="./components/assets/icons/contacts_icons.svg" alt="" />
        </span>
        <span>Contacts</span>
      </a>
    </nav>

    <footer class="summary-sidebar__footer">
      <a href="?page=privacy-policy" data-page="privacy-policy"
        >Privacy Policy</a
      >
      <a href="?page=legal-notice" data-page="legal-notice">Legal notice</a>
    </footer>
  </aside>

  <section class="summary-main">
    <header class="summary-topbar">
      <p>Kanban Project Management Tool</p>
      <div class="summary-user-actions">
        <button class="summary-help" type="button" aria-label="Help">?</button>
        <button
          class="summary-avatar"
          type="button"
          onclick="handleLogout()"
          aria-label="Log out"
        >
          <span id="summaryUserInitials">?</span>
        </button>
      </div>
    </header>
    <section class="contacts-content">
      <aside class="contacts-list-panel">
        <button class="contacts-add-button" type="button">
          Add new contact
          <img src="./components/assets/icons/person.svg" alt="" />
        </button>
        <ul class="contacts-list" id="contactsList"></ul>
      </aside>
      <section class="contacts-detail">
        <header class="contacts-heading">
          <h1>Contacts</h1>
          <p>Better with a team</p>
        </header>
        <div id="contactDetail" hidden>
          <div class="contacts-detail-header">
            <span
              class="contacts-detail-avatar"
              id="contactDetailAvatar"
            ></span>
            <div class="contacts-detail-title">
              <h2 class="contacts-detail-name" id="contactDetailName"></h2>
              <div class="contacts-detail-actions">
                <button
                  class="contacts-detail-action"
                  type="button"
                  id="contactEditButton"
                >
                  <img src="./components/assets/icons/edit.svg" alt="" />
                  Edit
                </button>
                <button
                  class="contacts-detail-action"
                  type="button"
                  id="contactDeleteButton"
                >
                  <img src="./components/assets/icons/delete.svg" alt="" />
                  Delete
                </button>
              </div>
            </div>
          </div>
          <h3 class="contacts-detail-subheading">Contact Information</h3>
          <div class="contacts-detail-info">
            <p class="contacts-detail-label">Email</p>
            <a id="contactDetailEmail"></a>
          </div>
          <div class="contacts-detail-info">
            <p class="contacts-detail-label">Phone</p>
            <p id="contactDetailPhone"></p>
          </div>
        </div>
      </section>
    </section>
  </section>
  <p class="contacts-toast" id="contactToast" role="status" aria-live="polite" hidden></p>
</main>

<section class="contacts-content">
  <aside class="contacts-list-panel">
    <button class="contacts-add-button" type="button" id="contactAddButton">
      Add new contact
      <img src="./components/assets/icons/person.svg" alt="" />
    </button>
    <ul class="contacts-list" id="contactsList"></ul>
    <button class="contacts-fab" type="button" id="contactAddFab" aria-label="Add new contact">
      <img src="./components/assets/icons/person_add_detail_view.svg" alt="" />
    </button>
  </aside>
  <section class="contacts-detail">
    <button class="contacts-back-button" type="button" id="contactBackButton" aria-label="Back to contact list">
      <img src="./components/assets/icons/arrow_left_contact_detail.svg" alt="" />
    </button>
    <header class="contacts-heading">
      <h1>Contacts</h1>
      <p>Better with a team</p>
    </header>
    <div id="contactDetail" hidden>
      <div class="contacts-detail-header">
        <span class="contacts-detail-avatar" id="contactDetailAvatar"></span>
        <div class="contacts-detail-title">
          <h2 class="contacts-detail-name" id="contactDetailName"></h2>
          <div class="contacts-detail-actions">
            <button class="contacts-detail-action" type="button" id="contactEditButton">
              <img src="./components/assets/icons/edit.svg" alt="" />
              Edit
            </button>
            <button class="contacts-detail-action" type="button" id="contactDeleteButton">
              <img src="./components/assets/icons/delete.svg" alt="" />
              Delete
            </button>
          </div>
        </div>
      </div>
      <h3 class="contacts-detail-subheading">Contact Information</h3>
      <div class="contacts-detail-info">
        <p class="contacts-detail-label">Email</p>
        <a class="contacts-detail-email" id="contactDetailEmail"></a>
      </div>
      <div class="contacts-detail-info">
        <p class="contacts-detail-label">Phone</p>
        <p id="contactDetailPhone"></p>
      </div>
      <button class="contacts-fab" type="button" id="contactMenuFab" aria-label="Open contact menu">
        <img src="./components/assets/icons/edit_contact_detail_view.svg" alt="" />
      </button>
    </div>
  </section>
</section>
<div data-include="./components/html/organisms/contact-edit-dialog.html"></div>
<div data-include="./components/html/organisms/contact-add-dialog.html"></div>
<p class="contacts-toast" id="contactToast" role="status" aria-live="polite" hidden></p>

<main class="summary-shell">
  <div data-include="./components/html/organisms/app-sidebar.html"></div>

  <section class="summary-main">
    <div data-include="./components/html/organisms/app-topbar.html"></div>

    <section class="summary-content" aria-labelledby="summaryTitle">
      <div class="summary-heading">
        <h1 id="summaryTitle">Join 360</h1>
        <p>Key Metrics at a Glance</p>
      </div>

      <div class="summary-dashboard">
        <section class="summary-metrics" aria-label="Task overview">
          <!-- Dummy metrics: these values are placeholders until real task data exists. -->
          <div class="summary-card summary-card--small">
            <div class="summary-card__main">
              <span class="summary-card__icon" aria-hidden="true">
                <img
                  class="summary-card__icon-image summary-card__icon-image--default"
                  src="./components/assets/icons/to_do_pen_icons.svg"
                  alt=""
                />
                <img
                  class="summary-card__icon-image summary-card__icon-image--hover"
                  src="./components/assets/icons/to_do_pen_icons_white.svg"
                  alt=""
                />
              </span>
              <div class="summary-card__text">
                <strong id="summaryTodoCount">1</strong>
                <span>To-do</span>
              </div>
            </div>
          </div>
          <div class="summary-card summary-card--small">
            <div class="summary-card__main">
              <span class="summary-card__icon" aria-hidden="true">
                <img
                  class="summary-card__icon-image summary-card__icon-image--default"
                  src="./components/assets/icons/check_done_icons.svg"
                  alt=""
                />
                <img
                  class="summary-card__icon-image summary-card__icon-image--hover"
                  src="./components/assets/icons/check_done_icons_white.svg"
                  alt=""
                />
              </span>
              <div class="summary-card__text">
                <strong id="summaryDoneCount">1</strong>
                <span>Done</span>
              </div>
            </div>
          </div>
          <div class="summary-card summary-card--urgent">
            <div class="summary-card__main">
              <span
                class="summary-card__icon summary-card__icon--urgent"
                aria-hidden="true"
              >
                <img src="./components/assets/icons/urgent_icons.svg" alt="" />
              </span>
              <div class="summary-card__text">
                <strong id="summaryUrgentCount">1</strong>
                <span>Urgent</span>
              </div>
            </div>
            <div class="summary-deadline">
              <strong id="summaryDeadlineDate">October 16, 2022</strong>
              <span>Upcoming Deadline</span>
            </div>
          </div>
          <div class="summary-card summary-card--count">
            <strong id="summaryBoardCount">5</strong>
            <span>Tasks in Board</span>
          </div>
          <div class="summary-card summary-card--count">
            <strong id="summaryProgressCount">2</strong>
            <span>Tasks in Progress</span>
          </div>
          <div class="summary-card summary-card--count">
            <strong id="summaryFeedbackCount">2</strong>
            <span>Awaiting Feedback</span>
          </div>
        </section>

        <section class="summary-greeting" aria-label="Signed in user">
          <p id="summaryGreetingTime">Good morning,</p>
          <h2 id="summaryGreeting">Guest</h2>
          <p id="summaryUserType">Signed in user is being checked.</p>
        </section>
      </div>
    </section>
  </section>
</main>

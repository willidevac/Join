<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign up | Join</title>
    <link rel="stylesheet" href="../../../base.css" />
  </head>
  <body>
    <main class="auth-page auth-page--signup" data-component="auth-page">
      <a
        class="auth-logo"
        data-component="auth-logo"
        href="../../../index.html"
        aria-label="Go to login page"
      >
        <span class="auth-logo__mark" aria-hidden="true">J</span>
        <span class="auth-logo__text" aria-hidden="true">OIN</span>
      </a>

      <section
        class="auth-card"
        data-component="auth-card"
        aria-labelledby="signup-title"
      >
        <a
          class="auth-card__back"
          data-component="auth-back-link"
          href="../../../index.html"
          aria-label="Back to login"
        >
          &larr;
        </a>

        <h1 class="auth-card__title" id="signup-title">Sign up</h1>

        <form
          class="auth-form"
          data-component="signup-form"
          id="signupForm"
          novalidate
        >
          <label
            class="form-field"
            data-component="auth-form-field"
            for="signupName"
          >
            <span class="form-field__label">Name</span>
            <input
              class="form-field__input"
              id="signupName"
              name="name"
              type="text"
              placeholder="Name"
              autocomplete="name"
            />
            <span
              class="form-field__icon"
              data-icon="user"
              aria-hidden="true"
            ></span>
          </label>

          <label
            class="form-field"
            data-component="auth-form-field"
            for="signupEmail"
          >
            <span class="form-field__label">Email</span>
            <input
              class="form-field__input"
              id="signupEmail"
              name="email"
              type="email"
              placeholder="Email"
              autocomplete="email"
            />
            <span
              class="form-field__icon"
              data-icon="mail"
              aria-hidden="true"
            ></span>
          </label>

          <label
            class="form-field"
            data-component="auth-form-field"
            for="signupPassword"
          >
            <span class="form-field__label">Password</span>
            <input
              class="form-field__input"
              id="signupPassword"
              name="password"
              type="password"
              placeholder="Password"
              autocomplete="new-password"
            />
            <span
              class="form-field__icon"
              data-icon="lock"
              aria-hidden="true"
            ></span>
          </label>

          <label
            class="form-field"
            data-component="auth-form-field"
            for="signupConfirmPassword"
          >
            <span class="form-field__label">Confirm Password</span>
            <input
              class="form-field__input"
              id="signupConfirmPassword"
              name="confirmPassword"
              type="password"
              placeholder="Confirm Password"
              autocomplete="new-password"
            />
            <span
              class="form-field__icon"
              data-icon="lock"
              aria-hidden="true"
            ></span>
          </label>

          <div class="privacy-consent" data-component="privacy-consent">
            <input
              class="privacy-consent__checkbox"
              id="privacyAccepted"
              name="privacyAccepted"
              type="checkbox"
              disabled
              aria-describedby="privacyConsentHint"
            />
            <label class="privacy-consent__label" for="privacyAccepted">
              I accept the
              <a
                class="privacy-consent__link"
                id="privacyPolicyLink"
                href="./privacy-policy.html"
              >
                Privacy policy
              </a>
            </label>
          </div>

          <p class="auth-form__message" id="privacyConsentHint">
            Open the Privacy policy before accepting it.
          </p>

          <button
            class="auth-form__submit"
            data-component="auth-submit-button"
            type="submit"
            disabled
          >
            Sign up
          </button>
        </form>
      </section>

      <footer class="auth-footer" data-component="auth-footer">
        <a href="./privacy-policy.html">Privacy Policy</a>
        <a href="./legal-notice.html">Legal notice</a>
      </footer>
    </main>
  </body>
</html>

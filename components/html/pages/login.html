<main class="auth-page auth-page--login">
  <a class="auth-logo" href="?page=login" data-page="login" aria-label="Go to start page">
    <span class="auth-logo__mark" aria-hidden="true">J</span>
    <span class="auth-logo__text" aria-hidden="true">OIN</span>
  </a>

  <div class="auth-signup-hint">
    <span>Not a Join user?</span>
    <a
      href="?page=signup&transition=signup"
      data-page="signup"
      data-transition="signup"
      class="auth-signup-hint__button"
    >
      Sign up
    </a>
  </div>

  <section class="auth-card" aria-labelledby="login-title">
    <h1 class="auth-card__title" id="login-title">Log in</h1>

    <form class="auth-form" id="loginForm" novalidate>
      <label class="form-field" for="loginEmail">
        <span class="form-field__label">Email</span>
        <input
          class="form-field__input"
          id="loginEmail"
          name="email"
          type="email"
          placeholder="Email"
          autocomplete="email"
        />
        <span class="form-field__icon" data-icon="mail" aria-hidden="true"></span>
      </label>

      <label class="form-field" for="loginPassword">
        <span class="form-field__label">Password</span>
        <input
          class="form-field__input"
          id="loginPassword"
          name="password"
          type="password"
          placeholder="Password"
          autocomplete="current-password"
        />
        <span class="form-field__icon" data-icon="lock" aria-hidden="true"></span>
      </label>

      <p class="auth-form__message" id="loginError"></p>

      <div class="auth-form__actions">
        <button class="auth-form__submit" type="submit">Log in</button>
        <button class="auth-form__guest" id="guestLoginButton" type="button">
          Guest Log in
        </button>
      </div>
    </form>
  </section>

  <footer class="auth-footer">
    <a href="?page=privacy-policy" data-page="privacy-policy">Privacy Policy</a>
    <a href="?page=legal-notice" data-page="legal-notice">Legal notice</a>
  </footer>
</main>

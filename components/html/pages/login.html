<main class="auth-page auth-page--login">
  <div data-include="./components/html/atoms/auth-logo.html"></div>

  <div class="auth-signup-hint">
    <span>Not a Join user?</span>
    <a
      href="./signup.html?transition=signup"
      data-page="signup"
      data-transition="signup"
      class="auth-signup-hint__button"
    >
      Sign up
    </a>
  </div>

  <section class="auth-card" aria-labelledby="login-title">
    <h1 class="auth-card__title" id="login-title">Log in</h1>

    <div data-include="./components/html/organisms/login-form.html"></div>
  </section>

  <div data-include="./components/html/molecules/auth-footer.html"></div>
</main>

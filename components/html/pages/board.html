<main class="summary-shell board-shell">
  <div data-include="./components/html/organisms/app-sidebar.html"></div>

  <section class="summary-main">
    <div data-include="./components/html/organisms/app-topbar.html"></div>

    <section class="board-content" aria-labelledby="boardTitle">
      <div class="board-header">
        <h1 id="boardTitle">Board</h1>
        <div class="board-header__right">
          <div class="board-search">
            <input type="text" id="boardSearchInput" placeholder="Find Task" />
            <button type="button" class="board-search__btn" aria-label="Search">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8" />
                <line x1="21" y1="21" x2="16.65" y2="16.65" />
              </svg>
            </button>
          </div>
          <a class="board-add-task" href="?page=add-task" data-page="add-task">Add task +</a>
        </div>
      </div>

      <div class="board-columns" aria-label="Saved tasks">
        <section class="board-column" aria-labelledby="boardTodoTitle">
          <div class="board-column__header">
            <h2 id="boardTodoTitle">To do</h2>
            <a class="board-column__add" href="?page=add-task" data-page="add-task" aria-label="Add task to To do">+</a>
          </div>
          <div class="board-task-list" data-board-status="todo"></div>
        </section>

        <section class="board-column" aria-labelledby="boardProgressTitle">
          <div class="board-column__header">
            <h2 id="boardProgressTitle">In progress</h2>
            <a class="board-column__add" href="?page=add-task" data-page="add-task" aria-label="Add task to In progress">+</a>
          </div>
          <div class="board-task-list" data-board-status="in-progress"></div>
        </section>

        <section class="board-column" aria-labelledby="boardFeedbackTitle">
          <div class="board-column__header">
            <h2 id="boardFeedbackTitle">Await feedback</h2>
            <a class="board-column__add" href="?page=add-task" data-page="add-task" aria-label="Add task to Await feedback">+</a>
          </div>
          <div class="board-task-list" data-board-status="feedback"></div>
        </section>

        <section class="board-column" aria-labelledby="boardDoneTitle">
          <div class="board-column__header">
            <h2 id="boardDoneTitle">Done</h2>
          </div>
          <div class="board-task-list" data-board-status="done"></div>
        </section>
      </div>
      <p class="board-search-no-results" id="boardSearchNoResults" hidden>
        No matching tasks found.
      </p>

      <section class="board-detail-overlay" id="boardTaskDetail" aria-labelledby="boardTaskDetailTitle"
        aria-modal="true" role="dialog" hidden>
        <article class="board-detail-card">
          <button class="board-detail-close" type="button" id="boardTaskDetailClose" aria-label="Close task details">
            x
          </button>

          <div class="board-detail-view" id="boardTaskDetailView">
            <span class="board-detail-category" id="boardTaskDetailCategory">Task</span>
            <h2 id="boardTaskDetailTitle">Task title</h2>
            <p id="boardTaskDetailDescription">Task description</p>
            <dl class="board-detail-list">
              <div>
                <dt>Due date</dt>
                <dd id="boardTaskDetailDueDate">-</dd>
              </div>
              <div>
                <dt>Priority</dt>
                <dd id="boardTaskDetailPriority">-</dd>
              </div>
              <div>
                <dt>Status</dt>
                <dd id="boardTaskDetailStatus">-</dd>
              </div>
              <div>
                <dt>Assigned to</dt>
                <dd id="boardTaskDetailAssignee">-</dd>
              </div>
              <div>
                <dt>Subtasks</dt>
                <dd id="boardTaskDetailSubtasks">-</dd>
              </div>
            </dl>
            <div class="board-detail-actions board-detail-actions--between">
              <button class="board-detail-danger" type="button" id="boardTaskDeleteButton">
                Delete
              </button>
              <button class="board-detail-primary" type="button" id="boardTaskEditButton">
                Edit
              </button>
            </div>
          </div>

          <form class="board-detail-edit-form" id="boardTaskEditForm" hidden>
            <label>
              <span>Title</span>
              <input id="boardTaskEditTitle" type="text" required />
            </label>
            <label>
              <span>Description</span>
              <textarea id="boardTaskEditDescription" rows="4"></textarea>
            </label>
            <label>
              <span>Due date</span>
              <input id="boardTaskEditDueDate" type="date" required />
            </label>
            <label>
              <span>Category</span>
              <select id="boardTaskEditCategory" required>
                <option value="user-story">User Story</option>
                <option value="technical-task">Technical Task</option>
              </select>
            </label>
            <label>
              <span>Priority</span>
              <select id="boardTaskEditPriority" required>
                <option value="urgent">Urgent</option>
                <option value="medium">Medium</option>
                <option value="low">Low</option>
              </select>
            </label>
            <label>
              <span>Status</span>
              <select id="boardTaskEditStatus" required>
                <option value="todo">To do</option>
                <option value="in-progress">In progress</option>
                <option value="feedback">Await feedback</option>
                <option value="done">Done</option>
              </select>
            </label>
            <label>
              <span>Assigned to</span>
              <input id="boardTaskEditAssignee" type="text" placeholder="Name of assigned contact" />
            </label>
            <label>
              <span>Subtasks</span>
              <textarea id="boardTaskEditSubtasks" rows="3" placeholder="One subtask per line"></textarea>
            </label>
            <div class="board-detail-actions">
              <button class="board-detail-secondary" type="button" id="boardTaskEditCancel">
                Cancel
              </button>
              <button class="board-detail-primary" type="submit">Save</button>
            </div>
          </form>
        </article>
      </section>
    </section>
  </section>
</main>

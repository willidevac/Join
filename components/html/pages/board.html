<main class="summary-shell board-shell">
  <aside class="summary-sidebar" aria-label="Main navigation">
    <a
      class="summary-sidebar__logo"
      href="?page=summary"
      data-page="summary"
      aria-label="Go to summary"
    >
      <img src="./components/assets/icons/Join logo vector.svg" alt="" />
    </a>

    <nav class="summary-nav">
      <a class="summary-nav__item" href="?page=summary" data-page="summary">
        <span class="summary-nav__icon" aria-hidden="true">
          <img src="./components/assets/icons/summary_icons.svg" alt="" />
        </span>
        <span>Summary</span>
      </a>
      <a class="summary-nav__item" href="?page=add-task" data-page="add-task">
        <span class="summary-nav__icon" aria-hidden="true">
          <img src="./components/assets/icons/add_task_icons.svg" alt="" />
        </span>
        <span>Add Task</span>
      </a>
      <a
        class="summary-nav__item summary-nav__item--active"
        href="?page=board"
        data-page="board"
      >
        <span class="summary-nav__icon" aria-hidden="true">
          <img src="./components/assets/icons/board_icons.svg" alt="" />
        </span>
        <span>Board</span>
      </a>
      <a class="summary-nav__item" href="?page=contacts" data-page="contacts">
        <span class="summary-nav__icon" aria-hidden="true">
          <img src="./components/assets/icons/contacts_icons.svg" alt="" />
        </span>
        <span>Contacts</span>
      </a>
    </nav>

    <footer class="summary-sidebar__footer">
      <a href="?page=privacy-policy" data-page="privacy-policy"
        >Privacy Policy</a
      >
      <a href="?page=legal-notice" data-page="legal-notice">Legal notice</a>
    </footer>
  </aside>

  <section class="summary-main">
    <header class="summary-topbar">
      <p>Kanban Project Management Tool</p>
      <div class="summary-user-actions">
        <button class="summary-help" type="button" aria-label="Help">?</button>
        <button
          class="summary-avatar"
          type="button"
          onclick="handleLogout()"
          aria-label="Log out"
        >
          <span id="summaryUserInitials">?</span>
        </button>
      </div>
    </header>

    <section class="board-content" aria-labelledby="boardTitle">
      <div class="board-header">
        <h1 id="boardTitle">Board</h1>
        <a class="board-add-task" href="?page=add-task" data-page="add-task"
          >Add task +</a
        >
      </div>

      <div class="board-columns" aria-label="Saved tasks">
        <section class="board-column" aria-labelledby="boardTodoTitle">
          <h2 id="boardTodoTitle">To do</h2>
          <div class="board-task-list" data-board-status="todo"></div>
        </section>

        <section class="board-column" aria-labelledby="boardProgressTitle">
          <h2 id="boardProgressTitle">In progress</h2>
          <div class="board-task-list" data-board-status="in-progress"></div>
        </section>

        <section class="board-column" aria-labelledby="boardFeedbackTitle">
          <h2 id="boardFeedbackTitle">Await feedback</h2>
          <div class="board-task-list" data-board-status="feedback"></div>
        </section>

        <section class="board-column" aria-labelledby="boardDoneTitle">
          <h2 id="boardDoneTitle">Done</h2>
          <div class="board-task-list" data-board-status="done"></div>
        </section>
      </div>

      <section
        class="board-detail-overlay"
        id="boardTaskDetail"
        aria-labelledby="boardTaskDetailTitle"
        aria-modal="true"
        role="dialog"
        hidden
      >
        <article class="board-detail-card">
          <button
            class="board-detail-close"
            type="button"
            id="boardTaskDetailClose"
            aria-label="Close task details"
          >
            x
          </button>

          <div class="board-detail-view" id="boardTaskDetailView">
            <span class="board-detail-category" id="boardTaskDetailCategory">Task</span>
            <h2 id="boardTaskDetailTitle">Task title</h2>
            <p id="boardTaskDetailDescription">Task description</p>
            <dl class="board-detail-list">
              <div>
                <dt>Due date</dt>
                <dd id="boardTaskDetailDueDate">-</dd>
              </div>
              <div>
                <dt>Priority</dt>
                <dd id="boardTaskDetailPriority">-</dd>
              </div>
              <div>
                <dt>Assigned to</dt>
                <dd id="boardTaskDetailAssignee">-</dd>
              </div>
              <div>
                <dt>Subtasks</dt>
                <dd id="boardTaskDetailSubtasks">-</dd>
              </div>
            </dl>
            <button class="board-detail-primary" type="button" id="boardTaskEditButton">
              Edit
            </button>
          </div>

          <form class="board-detail-edit-form" id="boardTaskEditForm" hidden>
            <label>
              <span>Title</span>
              <input id="boardTaskEditTitle" type="text" required />
            </label>
            <label>
              <span>Description</span>
              <textarea id="boardTaskEditDescription" rows="4"></textarea>
            </label>
            <label>
              <span>Due date</span>
              <input id="boardTaskEditDueDate" type="date" required />
            </label>
            <label>
              <span>Category</span>
              <select id="boardTaskEditCategory" required>
                <option value="user-story">User Story</option>
                <option value="technical-task">Technical Task</option>
              </select>
            </label>
            <label>
              <span>Priority</span>
              <select id="boardTaskEditPriority" required>
                <option value="urgent">Urgent</option>
                <option value="medium">Medium</option>
                <option value="low">Low</option>
              </select>
            </label>
            <div class="board-detail-actions">
              <button class="board-detail-secondary" type="button" id="boardTaskEditCancel">
                Cancel
              </button>
              <button class="board-detail-primary" type="submit">Save</button>
            </div>
          </form>
        </article>
      </section>
    </section>
  </section>
</main>
